<script>
"use strict";

/* =========================================================================
   LUMI — a visual vocabulary app
   Plain HTML/CSS/JavaScript. No build tools. One file.
   The structure mirrors the design prototype (Lumi.dc.html).
   ========================================================================= */

/* ---- 1. Language list -------------------------------------------------- */
const LANGS = [
  {code:'en', name:'English',  native:'English'},
  {code:'es', name:'Spanish',  native:'Español'},
  {code:'zh', name:'Mandarin', native:'中文'},
  {code:'ru', name:'Russian',  native:'Русский'},
  {code:'kk', name:'Kazakh',   native:'Қазақша'},

  {code:'fr', name:'French',     native:'Français'},

  {code:'pt', name:'Portuguese', native:'Português'},

// You can LEARN all of the above. "I speak" (native) is kept lean — the interface
// is in English, so we only offer big native-speaker markets as the spoken language.
const NATIVE_LANGS = new Set(['en', 'es', 'zh', 'ru', 'kk']);
const canSpeak = code => NATIVE_LANGS.has(code);

/* ---- 2. Sample objects (placeholder words, like the prototype) --------- */
/* Each object has two gradient colours, an organic "blob" radius, the word
   in every language, and an example sentence in every language.            */
const OBJECTS = {
  leaf:  {label:'leaf',  a:'#a9d69a', b:'#7cbf83', r:'62% 38% 55% 45% / 55% 48% 52% 45%', forms:{en:'the leaf',es:'la hoja',zh:'叶子',ru:'лист',kk:'жапырақ'}, ex:{en:'The leaf is green.',es:'La hoja es verde.',zh:'叶子是绿色的。',ru:'Лист зелёный.',kk:'Жапырақ жасыл.'}},
  book:  {label:'book',  a:'#eccb86', b:'#dcab5e', r:'42% 58% 46% 54% / 56% 42% 58% 44%', forms:{en:'the book',es:'el libro',zh:'书',ru:'книга',kk:'кітап'}, ex:{en:'The book is interesting.',es:'El libro es interesante.',zh:'这本书很有趣。',ru:'Книга интересная.',kk:'Кітап қызық.'}},
  cup:   {label:'cup',   a:'#a7c6ee', b:'#7ba2dd', r:'52% 48% 40% 60% / 58% 52% 48% 42%', forms:{en:'the cup',es:'la taza',zh:'杯子',ru:'чашка',kk:'кесе'}, ex:{en:'The cup is on the table.',es:'La taza está en la mesa.',zh:'杯子在桌子上。',ru:'Чашка на столе.',kk:'Кесе үстелде тұр.'}},
  key:   {label:'key',   a:'#eedb8a', b:'#dcc35e', r:'58% 42% 60% 40% / 44% 56% 44% 56%', forms:{en:'the key',es:'la llave',zh:'钥匙',ru:'ключ',kk:'кілт'}, ex:{en:'The key opens the door.',es:'La llave abre la puerta.',zh:'钥匙能开门。',ru:'Ключ открывает дверь.',kk:'Кілт есікті ашады.'}},
  plant: {label:'plant', a:'#94dcc6', b:'#6cc4ac', r:'46% 54% 58% 42% / 52% 46% 54% 48%', forms:{en:'the plant',es:'la planta',zh:'植物',ru:'растение',kk:'өсімдік'}, ex:{en:'The plant needs water.',es:'La planta necesita agua.',zh:'植物需要水。',ru:'Растению нужна вода.',kk:'Өсімдікке су керек.'}},
  chair: {label:'chair', a:'#e6b495', b:'#d2926d', r:'40% 60% 52% 48% / 60% 40% 56% 44%', forms:{en:'the chair',es:'la silla',zh:'椅子',ru:'стул',kk:'орындық'}, ex:{en:'The chair is made of wood.',es:'La silla es de madera.',zh:'椅子是木头做的。',ru:'Стул из дерева.',kk:'Орындық ағаштан жасалған.'}},
  lamp:  {label:'lamp',  a:'#f3c596', b:'#e6a76e', r:'56% 44% 48% 52% / 46% 54% 46% 54%', forms:{en:'the lamp',es:'la lámpara',zh:'灯',ru:'лампа',kk:'шам'}, ex:{en:'The lamp gives light.',es:'La lámpara da luz.',zh:'灯发出光。',ru:'Лампа даёт свет.',kk:'Шам жарық береді.'}},
  window:{label:'window',a:'#b3dbee', b:'#88c1de', r:'48% 52% 44% 56% / 54% 48% 52% 46%', forms:{en:'the window',es:'la ventana',zh:'窗户',ru:'окно',kk:'терезе'}, ex:{en:'The window is open.',es:'La ventana está abierta.',zh:'窗户开着。',ru:'Окно открыто.',kk:'Терезе ашық.'}},
};

/* ---- 3. Themes (background atmospheres) -------------------------------- */
const GLASS = {'--glass':'rgba(255,255,255,0.46)','--glass-strong':'rgba(255,255,255,0.66)','--glass-brd':'rgba(255,255,255,0.66)','--sheet':'rgba(248,249,247,0.82)'};
const THEMES = {
  Meadow:{...GLASS,'--bg':'radial-gradient(130% 80% at 50% 6%, rgba(255,255,255,.6) 0%, transparent 52%), linear-gradient(180deg,#a8c7df 0%,#c1d3d9 32%,#cfd6cc 50%,#bcc8a6 74%,#a3b288 100%)','--mtn':'rgba(92,118,134,0.42)','--field':'linear-gradient(180deg,#cddbe4 0%,#dde3dd 42%,#e7eae3 100%)','--field-fade':'rgba(221,227,221,0.72)','--ink':'#1d2329','--ink-soft':'rgba(29,35,41,0.62)','--cta':'#1c2127','--cta-ink':'#f3f4f1','--bg-solid':'#cfd6cc'},
  Dawn:{...GLASS,'--bg':'radial-gradient(130% 80% at 50% 6%, rgba(255,255,255,.66) 0%, transparent 52%), linear-gradient(180deg,#e6c7b4 0%,#eedacb 32%,#ece0d0 50%,#dcc8b2 74%,#cbb59b 100%)','--mtn':'rgba(150,118,98,0.4)','--field':'linear-gradient(180deg,#eedfd3 0%,#f1e8dc 42%,#f4ede3 100%)','--field-fade':'rgba(241,232,220,0.74)','--ink':'#2a221c','--ink-soft':'rgba(42,34,28,0.6)','--cta':'#261d16','--cta-ink':'#f6efe7','--bg-solid':'#ece0d0'},
  Mist:{...GLASS,'--bg':'radial-gradient(130% 80% at 50% 6%, rgba(255,255,255,.66) 0%, transparent 52%), linear-gradient(180deg,#bcc4cd 0%,#d0d6db 32%,#dadee1 50%,#ccd2d7 74%,#bcc3ca 100%)','--mtn':'rgba(118,128,140,0.42)','--field':'linear-gradient(180deg,#d6dbe0 0%,#e3e6e9 42%,#ebedef 100%)','--field-fade':'rgba(227,230,233,0.74)','--ink':'#23282e','--ink-soft':'rgba(35,40,46,0.6)','--cta':'#20242a','--cta-ink':'#f2f3f4','--bg-solid':'#dadee1'},
};

/* ---- 4. Saved state — tiny settings in localStorage, the collection
   (cards + cut-out images) in IndexedDB (which holds far more). ---------- */
const OLD_KEY = 'lumi.v1';             // previous single-blob localStorage key (for migration)
const SETTINGS_KEY = 'lumi.settings';  // tiny: spoken / learning / theme / onboarded
const DB_NAME = 'lumi', DB_STORE = 'kv', JOURNALS_KEY = 'journals';

// ---- Free tier / Lumi Pro ------------------------------------------------
const CAPTURE_KEY = 'lumi.captures';   // lifetime count of saved words (the free-tier meter)
const PREMIUM_KEY = 'lumi.premium';    // '1' once this person is on Lumi Pro
const FREE_LIMIT  = 5;                 // words you can collect free before Pro is needed
// Polar hosted-checkout links (PRODUCTION). The in-app buttons append the signed-in
// user's id + email so the webhook can unlock the right account after payment.
const POLAR_MONTHLY_URL = 'https://buy.polar.sh/polar_cl_YFzisyctIXO4OOpOGohrEXatdd7IkMTaGoYxV4LVLat';
const POLAR_ANNUAL_URL  = 'https://buy.polar.sh/polar_cl_h0ng8vruSd40zV2x6t0mMe7phxbmaI7bsK80p3dWfTO';
// Polar customer portal — subscribers log in with their email to manage/cancel.
const POLAR_PORTAL_URL = 'https://polar.sh/lumiwords/portal';

function loadSettings(){
  try { const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)); if(s) return s; } catch(e){}
  try { const old = JSON.parse(localStorage.getItem(OLD_KEY)); if(old) return old; } catch(e){}  // old shape
  return {};
}
function saveSettings(){
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      spoken: state.spoken, learning: state.learning, theme: state.theme, onboarded: state.onboarded,
    }));
  } catch(e){ console.warn('settings save failed', e); }
}
// IndexedDB key/value helpers (large storage, for the collection + images).
function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(DB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbSet(key, val){
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(val, key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  }));
}
function idbGet(key){
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const rq = tx.objectStore(DB_STORE).get(key);
    rq.onsuccess = () => resolve(rq.result);
    rq.onerror = () => reject(rq.error);
  }));
}
// Save settings (sync, tiny) + the collection (IndexedDB, large). Returns success.
async function saveStore(){
  saveSettings();
  try { await idbSet(JOURNALS_KEY, state.journals); return true; }
  catch(e){ console.warn('Could not save collection:', e); return false; }
}
// ---- Free-tier meter helpers --------------------------------------------
function loadCaptureCount(){ const v = localStorage.getItem(CAPTURE_KEY); return v == null ? null : (parseInt(v, 10) || 0); }
function saveCaptureCount(){ try { localStorage.setItem(CAPTURE_KEY, String(state.captureCount || 0)); } catch(e){} }
function isPremium(){ return !!state.premium; }
function freeLeft(){ return Math.max(0, FREE_LIMIT - (state.captureCount || 0)); }
function atFreeLimit(){ return !isPremium() && (state.captureCount || 0) >= FREE_LIMIT; }
// Opens the Polar checkout for a plan (or explains it's coming if no link is set yet).
function openCheckout(url){
  if(!url){ showToast('Payments are being set up — coming very soon!', true); return; }
  // Remember we're heading to checkout, so when Polar redirects back we can poll for
  // the upgrade and lift the paywall automatically (the webhook lands a moment later).
  try { localStorage.setItem('lumi.pendingUpgrade', String(Date.now())); } catch(_){}
  try {
    const u = new URL(url);
    // Tell Polar who this is, so the webhook can unlock the right account after payment.
    if(state.user){
      if(state.user.id){ u.searchParams.set('customer_external_id', state.user.id); u.searchParams.set('metadata[user_id]', state.user.id); }
      if(state.user.email) u.searchParams.set('customer_email', state.user.email);
    }
    window.location.href = u.toString();
  } catch(e){ window.location.href = url; }
}
// Subscribing requires an account (so the webhook can unlock the right one). If a logged-out
// visitor taps a plan, remember it, send them to sign up, and resume checkout once they're in.
function startCheckout(plan, url){
  if(!state.user){
    try { localStorage.setItem('lumi.pendingPlan', plan); } catch(_){}
    state.authMode = 'signup'; state.authError = ''; state.authNotice = t('auth.saveNotice');
    go('auth');
    return;
  }
  openCheckout(url);
}
function resumePendingPlan(){
  let plan; try { plan = localStorage.getItem('lumi.pendingPlan'); } catch(_){ return; }
  if(!plan || !state.user) return;
  try { localStorage.removeItem('lumi.pendingPlan'); } catch(_){}
  const url = plan === 'annual' ? POLAR_ANNUAL_URL : POLAR_MONTHLY_URL;
  setTimeout(() => openCheckout(url), 500);   // let the sign-in settle, then head to Polar
}
// After returning from checkout, the subscription webhook may take a couple of seconds
// to land. Poll the account's Pro status so the paywall lifts on its own — no reload.
async function pollPremiumAfterCheckout(){
  let flag; try { flag = localStorage.getItem('lumi.pendingUpgrade'); } catch(_){ return; }
  if(!flag || !state.user) return;
  const age = Date.now() - (parseInt(flag, 10) || 0);
  if(age > 30 * 60 * 1000){ try { localStorage.removeItem('lumi.pendingUpgrade'); } catch(_){} return; }   // stale — ignore
  showToast('Activating your subscription…', true);
  let tries = 0;
  const tick = async () => {
    await refreshPremium();
    if(state.premium){
      try { localStorage.removeItem('lumi.pendingUpgrade'); } catch(_){}
      showToast('Welcome to Lumi Pro! 🎉', true);
      return;
    }
    if(++tries < 12){ setTimeout(tick, 2000); }                       // keep checking ~24s
    else { try { localStorage.removeItem('lumi.pendingUpgrade'); } catch(_){}
      showToast("Almost there — if Pro isn't active shortly, refresh the page.", false); }
  };
  setTimeout(tick, 800);   // brief head start so the webhook can land first
}

/* ---- 5. Live app state ------------------------------------------------- */
const saved0 = loadSettings();
const state = {
  screen:   'loading',   // show a spinner until the account check finishes
  onboarded: !!saved0.onboarded,
  spoken:   canSpeak(saved0.spoken) ? saved0.spoken : 'en',   // native must be a supported "I speak" language
  learning: saved0.learning || 'es',
  theme:    saved0.theme    || 'Meadow',
  journals: { en:[], es:[], zh:[], ru:[], kk:[] },   // hydrated from IndexedDB below
  current:  null,    // the object currently being shown on the result screen
  saved:    false,   // has the current result been saved?
  flipped:  {},      // which collection cards are flipped (by id)
  sheet:    null,    // 'switch' | 'settings' | null
  sheetTarget:'learning', // which field the language sheet is editing
  toast:    null,    // toast message text
  procPhase:0,       // 0 = "Removing background…", 1 = "Finding the word…"
  reveal:   false,   // play the cut-out reveal animation on this render
  // --- accounts ---
  user:     null,    // the signed-in Supabase user (or null)
  authMode: 'signin',// 'signin' | 'signup'
  authEmail:'',      // kept so an error re-render doesn't wipe the field
  authPass: '',
  authError:'',
  authNotice:'',     // neutral info message (e.g. "check your email")
  authBusy: false,
  authReady:false,   // has the initial session check finished?
  // --- free tier / Pro ---
  captureCount: loadCaptureCount() || 0,   // lifetime words saved (free meter)
  premium: localStorage.getItem(PREMIUM_KEY) === '1',
};
LANGS.forEach(l => { if(!state.journals[l.code]) state.journals[l.code] = []; });
// Dev/test toggle: open /app?pro=on to become Pro (or ?pro=off) without paying.
(function(){
  try {
    const p = new URLSearchParams(location.search).get('pro');
    if(p === 'on' || p === 'off'){
      state.premium = (p === 'on');
      localStorage.setItem(PREMIUM_KEY, state.premium ? '1' : '0');
      history.replaceState(null, '', location.pathname);   // tidy the URL back to /app
    }
  } catch(e){}
})();
// Live A/B test for object naming (temporary). ?ai=gemini or ?ai=qwen picks the vision
// model; ?direct=1 uses that model's OWN Kazakh/target words (skips Google Translate).
// The choice sticks so you can shoot several photos to compare. ?ai=off (and ?direct=off)
// clears it and returns to the normal Qwen + Google pipeline.
const AITEST_KEY = 'lumi.aitest';
let AITEST = (function(){ try { return JSON.parse(localStorage.getItem(AITEST_KEY) || '{}') || {}; } catch(e){ return {}; } })();
(function(){
  try {
    const q = new URLSearchParams(location.search);
    const ai = q.get('ai'), direct = q.get('direct');
    let changed = false;
    if(ai !== null){ if(ai === 'off' || ai === '') delete AITEST.provider; else AITEST.provider = ai; changed = true; }
    if(direct !== null){ if(direct === 'off' || direct === '0' || direct === '') delete AITEST.direct; else AITEST.direct = true; changed = true; }
    if(changed){ localStorage.setItem(AITEST_KEY, JSON.stringify(AITEST)); }
  } catch(e){}
})();

// Load the saved collection from IndexedDB; migrate the old localStorage blob once.
(async function hydrateJournals(){
  try {
    let journals = await idbGet(JOURNALS_KEY);
    if(!journals){
      try {
        const old = JSON.parse(localStorage.getItem(OLD_KEY));
        if(old && old.journals){ journals = old.journals; await idbSet(JOURNALS_KEY, journals); }
      } catch(e){}
    }
    if(journals){
      state.journals = journals;
      LANGS.forEach(l => { if(!state.journals[l.code]) state.journals[l.code] = []; });
    }
    // First run of the free meter: seed it from any words already collected.
    if(loadCaptureCount() == null){
      state.captureCount = Object.values(state.journals).reduce((n, arr) => n + (arr ? arr.length : 0), 0);
      saveCaptureCount();
    }
    saveSettings();
    try { localStorage.removeItem(OLD_KEY); } catch(e){}   // free the old (full) blob
    render();
  } catch(e){ console.warn('Could not load collection:', e); }
})();

let timers = [];
function clearTimers(){ timers.forEach(clearTimeout); timers = []; }

/* ---- 6. Small helpers -------------------------------------------------- */
const langOf = code => LANGS.find(l => l.code === code) || LANGS[0];
const theme  = () => THEMES[state.theme] || THEMES.Meadow;
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
// A romanized reading under a word: pinyin for Chinese, Revised Romanization for
// Korean. (Japanese romaji needs a dictionary — handled server-side, coming next.)
function pinyinOf(text, lang){
  if(lang !== 'zh' || !text || !window.lumiPinyin) return '';
  const p = (window.lumiPinyin(text) || '').trim();
  return (p && p !== String(text)) ? p : '';   // hide if the library returned the raw text
}
function readingOf(text, lang, stored){
  if(!text) return '';
  if(lang === 'zh') return pinyinOf(text, 'zh');
  if(lang === 'ko' && window.lumiRomanizeKo){
    const r = (window.lumiRomanizeKo(text) || '').trim();
    return (r && r !== String(text)) ? r : '';
  }
  if(lang === 'ja') return (stored || '').trim();   // Japanese romaji comes from the AI, stored on the card
  return '';
}
// Turn a {key:value} style object into an inline style string
function css(obj){ return Object.entries(obj).map(([k,v]) => `${k.replace(/[A-Z]/g,m=>'-'+m.toLowerCase())}:${v}`).join(';'); }

/* ---- 6b. Interface language (i18n) ------------------------------------
   The app UI follows the "I speak" language. t('key') looks up a string in

function uiLang(){ return ['en','es','zh','ru','kk'].includes(state.spoken) ? state.spoken : 'en'; }
function t(key, vars){
  const e = I18N[key];
  let s = e ? (e[uiLang()] || e.en || key) : key;
  if(vars){ for(const k in vars){ s = s.split('{' + k + '}').join(vars[k]); } }
  return s;
}
// "N words" with correct plural forms (Russian has three; kk/zh don't inflect).
function ruPlural(n, one, few, many){ const a = n%10, b = n%100; if(a===1 && b!==11) return one; if(a>=2 && a<=4 && !(b>=12 && b<=14)) return few; return many; }
function nWords(n){
  switch(uiLang()){
    case 'es': return n + (n===1 ? ' palabra' : ' palabras');
    case 'zh': return n + ' 个单词';
    case 'ru': return n + ' ' + ruPlural(n, 'слово', 'слова', 'слов');
    case 'kk': return n + ' сөз';
    default:   return n + (n===1 ? ' word' : ' words');
  }
}
function tFreeLeft(n){
  switch(uiLang()){
    case 'es': return n + (n===1 ? ' palabra gratis' : ' palabras gratis');
    case 'zh': return '还剩 ' + n + ' 个免费单词';
    case 'ru': return 'Осталось ' + n + ' ' + ruPlural(n, 'бесплатное слово', 'бесплатных слова', 'бесплатных слов');
    case 'kk': return n + ' тегін сөз қалды';
    default:   return n + ' free ' + (n===1 ? 'word' : 'words') + ' left';
  }
}
// "N words in <language>" (neutral separator for langs where the preposition is awkward).
function tCountIn(n, langNative){
  const w = nWords(n);
  switch(uiLang()){
    case 'es': return w + ' en ' + langNative;
    case 'en': return w + ' in ' + langNative;
    default:   return w + ' · ' + langNative;
  }
}

  const o = OBJECTS[objKey]; if(!o) return '#c9ccc6';
  return `radial-gradient(130% 100% at 28% 18%, ${o.a} 0%, transparent 58%), radial-gradient(120% 110% at 82% 84%, ${o.b} 0%, transparent 60%), linear-gradient(165deg,#cbcfc6,#b6bbb0)`;
}

function photoFrame(photo, w, h){

    <div style="position:absolute;inset:4px;border-radius:24px;background:#cdd2cb url('${photo}') center/cover"></div>

  </div>`;

// Read a photo file, shrink it (so it loads fast + fits device storage), return a data URL.
function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w >= h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
      else if(h > w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      try { resolve(canvas.toDataURL('image/jpeg', quality)); }
      catch(e){ reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
    img.src = url;
  });
}
// Resize a data URL, KEEPING transparency (PNG). Used to shrink the cut-out before storing.
function resizeDataUrl(dataUrl, maxDim, mime){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w >= h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
      else if(h > w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL(mime || 'image/png'));
    };
    img.onerror = () => reject(new Error('Could not resize image'));
    img.src = dataUrl;
  });
}
// Crop the transparent margins off a cut-out PNG so the object FILLS the frame
// (a cut-out floats small inside a big transparent canvas otherwise). Resolves to
// { url, frac } where frac = share of pixels that are opaque (0 = fully empty
// cut-out). On any problem returns the original with frac:1 (keep it).
function trimTransparent(dataUrl, padFrac){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        const w = img.naturalWidth, h = img.naturalHeight;
        const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, w, h).data;
        let minX = w, minY = h, maxX = -1, maxY = -1, opaque = 0;
        const A = 12;   // alpha threshold
        for(let y = 0; y < h; y++){
          for(let x = 0; x < w; x++){
            if(data[(y*w + x)*4 + 3] > A){
              opaque++;
              if(x < minX) minX = x; if(x > maxX) maxX = x;
              if(y < minY) minY = y; if(y > maxY) maxY = y;
            }
          }
        }
        const frac = opaque / (w * h);
        if(maxX < minX || maxY < minY){ resolve({ url: dataUrl, frac: 0 }); return; }   // nothing opaque
        const pad = Math.round(Math.max(maxX - minX, maxY - minY) * (padFrac == null ? 0.06 : padFrac));
        minX = Math.max(0, minX - pad); minY = Math.max(0, minY - pad);
        maxX = Math.min(w - 1, maxX + pad); maxY = Math.min(h - 1, maxY + pad);
        const cw = maxX - minX + 1, ch = maxY - minY + 1;
        const out = document.createElement('canvas'); out.width = cw; out.height = ch;
        out.getContext('2d').drawImage(cv, minX, minY, cw, ch, 0, 0, cw, ch);
        resolve({ url: out.toDataURL('image/png'), frac });
      } catch(e){ resolve({ url: dataUrl, frac: 1 }); }
    };
    img.onerror = () => resolve({ url: dataUrl, frac: 1 });
    img.src = dataUrl;
  });
}
// Prepare a server cut-out for display in ONE fast pass: cap the working resolution,
// find the opaque bounding box, then crop + resize in a single draw/encode. Returns
// a small PNG data URL, or null when the cut-out is (near-)empty (caller shows the
// photo instead). Much faster than trim-then-resize (which decoded + PNG-encoded twice).
function processCutout(dataUrl, maxOut){
  maxOut = maxOut || 512;
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        // Cap analysis resolution so the pixel scan + encode stay quick on phones.
        const nat = Math.max(img.naturalWidth, img.naturalHeight) || 1;
        const s = Math.min(1, 1024 / nat);
        const w = Math.max(1, Math.round(img.naturalWidth * s)), h = Math.max(1, Math.round(img.naturalHeight * s));
        const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        const ctx = cv.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
        const data = ctx.getImageData(0, 0, w, h).data;
        let minX = w, minY = h, maxX = -1, maxY = -1, opaque = 0;
        const A = 12;
        for(let y = 0; y < h; y++){
          for(let x = 0; x < w; x++){
            if(data[(y*w + x)*4 + 3] > A){
              opaque++;
              if(x < minX) minX = x; if(x > maxX) maxX = x;
              if(y < minY) minY = y; if(y > maxY) maxY = y;
            }
          }
        }
        const frac = opaque / (w * h);                                   // share of the whole image
        const bbox = (maxX - minX + 1) * (maxY - minY + 1);
        const fill = maxX < minX ? 0 : opaque / bbox;                    // how solidly the object fills its own box
        // Reject empty cut-outs AND sparse/fragmented ones (e.g. a segmenter that
        // grabbed only a shiny edge/handle of a big appliance) → show the photo instead.
        if(maxX < minX || frac < 0.012 || fill < 0.14){ resolve(null); return; }
        const pad = Math.round(Math.max(maxX - minX, maxY - minY) * 0.06);
        minX = Math.max(0, minX - pad); minY = Math.max(0, minY - pad);
        maxX = Math.min(w - 1, maxX + pad); maxY = Math.min(h - 1, maxY + pad);
        const cw = maxX - minX + 1, ch = maxY - minY + 1;
        const os = Math.min(1, maxOut / Math.max(cw, ch));
        const ow = Math.max(1, Math.round(cw * os)), oh = Math.max(1, Math.round(ch * os));
        const out = document.createElement('canvas'); out.width = ow; out.height = oh;
        out.getContext('2d').drawImage(cv, minX, minY, cw, ch, 0, 0, ow, oh);   // crop + resize in one draw
        resolve(out.toDataURL('image/png'));   // one encode
      } catch(e){ resolve(dataUrl); }   // can't analyze → keep the original cut-out
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}
// Background-removal engine (in-browser AI). Loaded once, on first use.
let _bgModule = null;
async function removeBg(dataUrl){
  if(!_bgModule) _bgModule = await import('https://esm.sh/@imgly/background-removal@1.5.8');
  const blob = await _bgModule.removeBackground(dataUrl);
  const cut = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Could not read cut-out'));

    `drop-shadow(0 ${e}px 0 #fff)`, `drop-shadow(0 -${e}px 0 #fff)`,
    `drop-shadow(${d}px ${d}px 0 #fff)`, `drop-shadow(-${d}px ${d}px 0 #fff)`,
    `drop-shadow(${d}px -${d}px 0 #fff)`, `drop-shadow(-${d}px -${d}px 0 #fff)`,
    `drop-shadow(0 16px 22px rgba(35,45,40,.5))`

// Called once a real photo has been chosen/compressed. Shows a short "processing"
// moment, then the result. (Automatic background-removal was removed — it was
// unreliable; a better AI-based cut-out will come with the naming stage.)
async function startCapture(photo){
  clearTimers();
  state.current = { photo, learning: state.learning, spoken: state.spoken,
    found: null, word: '', reading: '', meaning: '', example: '', exampleTr: '', confidence: '', error: null, cutout: null };
  state.saved = false;
  state.screen = 'processing';
  state.procPhase = 0;
  render();
  timers.push(setTimeout(() => { if(isCurrent(photo)){ state.procPhase = 1; render(); } }, 1050));

  // Cut the object out of its background, in parallel with naming.
  const cutoutPromise = fetchCutout(photo).catch(() => null);
  // If it finishes after the result is already on screen, attach it then.
  cutoutPromise.then(cut => {
    if(cut && isCurrent(photo) && !state.current.cutout){ state.current.cutout = cut; triggerReveal(); render(); }
  });

  const callName = async () => {
    try {
      const r = await fetch('/api/name', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: photo, spoken: state.spoken, learning: state.learning, provider: AITEST.provider, direct: AITEST.direct })
      });
      if(!r.ok) return { found: false, _net: true };
      return await r.json();
    } catch(e){ return { found: false, _net: true }; }
  };
  let data = await callName();
  // A clear object occasionally reads as "not found" on a hard or odd-angle shot —
  // naming is probabilistic, so retry ONCE before giving up (a second pass usually lands).
  if(isCurrent(photo) && data && !data.found && !data._net){
    data = await callName();
  }
  if(!isCurrent(photo)) return;            // user retook / left — drop stale result
  if(data && data.found && data.word){
    state.current.found = true;
    state.current.word = data.word;
    state.current.meaning = data.meaning || '';
    state.current.example = data.example || '';
    state.current.exampleTr = data.exampleTr || '';
    state.current.reading = data.reading || '';
    state.current.confidence = data.confidence || '';
  } else {
    state.current.found = false;
    state.current.error = data && data._net ? 'network' : (data && data.error ? 'server' : 'notfound');
  }
  // Wait only a SHORT grace window for the cut-out: if it's nearly ready we show it
  // straight away (no swap); if it's slow we show the result now (with the photo) and
  // the cut-out reveals itself in-place when it arrives — so the user never waits on a
  // loading screen for several seconds. (The cutoutPromise.then handler above does the
  // in-place upgrade + reveal.)
  if(isCurrent(photo)){
    const cut = await Promise.race([ cutoutPromise, new Promise(r => setTimeout(() => r(null), 1200)) ]);
    if(cut && isCurrent(photo)){ state.current.cutout = cut; triggerReveal(); }
  }
  if(isCurrent(photo)){ state.screen = 'result'; render(); }
}

// Ask the server to cut the object out of its background; returns a transparent

// Pronounce a word/phrase via the server TTS. Caches audio per text so repeats

const _speakCache = {};

// Pronounce a word. Prefers the natural ElevenLabs voice; the device voice is the
// fallback. On touch devices, mobile browsers block audio started after an async wait,
// so there we must speak instantly with the device voice in the tap and cache the
// natural voice for the next tap. On desktop we can play ElevenLabs on the first tap.
function speak(text, lang){
  text = (text || '').trim();
  if(!text) return;
  const ckey = (lang || '') + '|' + text;
  if(_speakCache[ckey]){ playAudioUrl(_speakCache[ckey]); return; }   // warm cache → play the real voice now
  // Cold tap: create + "unlock" an Audio element inside this tap so iOS will let it
  // play once the file arrives, then fill in the src when the fetch resolves. We only
  // ever play the correct server (Azure) pronunciation — never the phone's built-in
  // voice, which could mispronounce the word into gibberish.
  let a = null;
  try { if(_audio){ _audio.pause(); } a = new Audio(); _audio = a; a.play().catch(() => {}); } catch(e){}
  fetchTTS(text, lang).then(url => {
    if(!url) return;
    _speakCache[ckey] = url;
    try { if(a){ a.src = url; a.play().catch(() => {}); } else { playAudioUrl(url); } } catch(e){}
  });

async function fetchTTS(text, lang){

    if(!r.ok) return null;
    return URL.createObjectURL(await r.blob());
  } catch(e){ return null; }

// Warm the audio cache in the background so the NEXT ♪ tap plays instantly (no
// wait for the network). Used when a review/result card is shown. De-duped.
const _ttsInflight = {};
function prefetchTTS(text, lang){
  text = (text || '').trim(); if(!text) return;

function speakViaBrowser(text, lang){

// Upload a card image (data URL) to Supabase Storage and return its public URL, or
// null on any problem (offline / not signed in) so the caller falls back to base64.
async function uploadCardImage(dataUrl){
  if(!dataUrl || dataUrl.indexOf('data:') !== 0) return null;   // already a URL, or nothing to upload
  try {
    const supa = await window.lumiSupaReady;
    const { data } = await supa.auth.getSession();
    const token = data && data.session && data.session.access_token;
    if(!token) return null;
    const r = await fetch('/api/store-image', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ image: dataUrl }) });
    if(!r.ok) return null;

    return (j && j.path) || null;
  } catch(e){ return null; }
}
// Turn the card images we hold as storage PATHS into short-lived signed URLs we can
// actually display (private bucket). Keeps images login-gated; cards that already have a
// local base64 image are left as-is (they display straight away, offline).
async function resolveCardImages(){
  if(!state.user) return;
  const need = {};
  Object.keys(state.journals).forEach(code => (state.journals[code]||[]).forEach(c => {
    if(c && c.imagePath && (!c.image || String(c.image).indexOf('data:') !== 0)){
      (need[c.imagePath] = need[c.imagePath] || []).push(c);
    }
  }));
  const paths = Object.keys(need);
  if(!paths.length) return;
  try {
    const supa = await window.lumiSupaReady;
    const { data } = await supa.auth.getSession();
    const token = data && data.session && data.session.access_token;
    if(!token) return;
    let changed = false;
    for(let i = 0; i < paths.length; i += 100){
      const chunk = paths.slice(i, i + 100);
      const r = await fetch('/api/sign-images', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ paths: chunk }) });
      if(!r.ok) continue;
      const signed = ((await r.json()) || {}).signed || {};
      chunk.forEach(p => { const url = signed[p]; if(url){ (need[p]||[]).forEach(c => c.image = url); changed = true; } });
    }
    if(changed){ render(); idbSet(JOURNALS_KEY, state.journals).catch(()=>{}); }
  } catch(e){ /* offline / not signed in — cards with a local copy still show */ }
}
async function save(){

  state.journals[cur.learning] = [card, ...(state.journals[cur.learning]||[])];

  state.saved = true;
  render();

  try {
    if(!localStorage.getItem('lumi.seenJournal')){
      localStorage.setItem('lumi.seenJournal', '1');

      setTimeout(() => {

      }, 1100);

      // card.image as the data URL so it still shows instantly + offline on this device.
      const path = await uploadCardImage(card.image);
      if(path) card.imagePath = path;
      const base = { learning:card.learning, word:card.word, meaning:card.meaning, example:card.example, cut:card.cut, image: path || card.image };
      let ins = await supa.from('cards').insert({ ...base, example_tr: card.exampleTr || null, reading: card.reading || null }).select('id').single();
      if(ins.error && /reading/i.test(ins.error.message || '')){
        ins = await supa.from('cards').insert({ ...base, example_tr: card.exampleTr || null }).select('id').single();   // no reading column yet
      }
      if(ins.error && /example_tr/i.test(ins.error.message || '')){
        ins = await supa.from('cards').insert(base).select('id').single();   // neither optional column yet
      }
      if(ins.error) throw ins.error;
      if(ins.data && ins.data.id) card.id = ins.data.id;   // adopt the real cloud id
    } catch(e){ console.warn('cloud save failed:', e); ok = false; }
  }

  showToast(ok ? (t('toast.saved') + ' · ' + cur.word) : t('toast.savedSyncIssue'), ok);
}

  if(Date.now() - _lpAt < 700){ _lpAt = 0; return; }   // a long-press just opened the menu — don't also flip
  state.flipped[id] = !state.flipped[id];
  render();
}
function openCardActions(id){ state.sheetTarget = id; state.cardDeleteConfirm = false; state.sheet = 'cardactions'; render(); }
async function deleteCard(id){
  Object.keys(state.journals).forEach(code => { state.journals[code] = (state.journals[code]||[]).filter(c => String(c.id) !== String(id)); });
  delete state.flipped[id];
  state.sheet = null; state.cardDeleteConfirm = false;
  render();
  saveStore();
  if(state.user){
    try { const supa = await window.lumiSupaReady; await supa.from('cards').delete().eq('id', id); }
    catch(e){ console.warn('cloud delete failed:', e); }
  }
  showToast(t('toast.deleted'), true);
}
function openSheet(t, target){ state.sheet = t; if(target) state.sheetTarget = target; render(); }
function closeSheet(){ state.sheet = null; render(); }
// ---- Edit a saved card (fix a wrong word / translation, e.g. Kazakh) ----
function findCard(id){ let found = null; Object.keys(state.journals).forEach(code => { const c = (state.journals[code]||[]).find(x => String(x.id) === String(id)); if(c) found = c; }); return found; }
function openEditCard(id){ const card = findCard(id); if(!card) return; state.editTarget = id; state.editDraft = { word: card.word||'', meaning: card.meaning||'', example: card.example||'' }; state.sheet = 'editcard'; render(); }
function lumiEdit(k, v){ if(state.editDraft) state.editDraft[k] = v; }   // called inline by the input fields
async function saveCardEdit(){
  const id = state.editTarget, d = state.editDraft || {};
  const card = findCard(id);
  if(card){ card.word = (d.word||'').trim(); card.meaning = (d.meaning||'').trim(); card.example = (d.example||'').trim(); }
  state.sheet = null;
  render();
  saveStore();
  if(state.user && card){
    try { const supa = await window.lumiSupaReady;
      await supa.from('cards').update({ word:card.word, meaning:card.meaning, example:card.example }).eq('id', id);
    } catch(e){ console.warn('cloud card update failed:', e); }
  }
  showToast('Card updated', true);
}
function pickLang(code){
  const t = state.sheetTarget;
  if(t === 'spoken'){
    if(code === state.learning){ closeSheet(); return; }   // can't speak what you're learning
    state.spoken = code;
  } else {
    if(code === state.spoken){ closeSheet(); return; }      // can't learn what you speak
    state.learning = code; state.flipped = {};
  }
  state.sheet = null;
  saveSettings();   // only the language changed — no need to re-write the whole collection (that was the lag)
  syncProfile();
  render();
}
function beginOnboarding(){
  state.onboarded = true; markUserOnboarded(); state.screen = 'home'; saveStore(); syncProfile(); render();
}

/* ---- 7b. Accounts (Supabase auth) ------------------------------------- */
// Check for an existing session on load, then react to sign in / sign out.
async function initAuth(){
  let supa;
  try { supa = await window.lumiSupaReady; }
  catch(e){ console.warn('Supabase not available:', e); state.authReady = true; state.screen = state.onboarded ? 'home' : 'onboarding'; render(); return; }
  try {
    const { data } = await supa.auth.getSession();
    state.user = data && data.session ? data.session.user : null;
  } catch(e){ state.user = null; }
  state.authReady = true;
  applyAuthScreen();
  render();
  if(state.user){ syncOnAuth(); refreshPremium(); pollPremiumAfterCheckout(); resumePendingPlan(); }   // returning session → pull cloud data + Pro status (+ catch a just-completed upgrade)
  supa.auth.onAuthStateChange((event, session) => {
    state.user = session ? session.user : null;
    if(event === 'PASSWORD_RECOVERY'){ state.recovery = true; state.authMode = 'newpassword'; state.authError = ''; state.authNotice = ''; }
    applyAuthScreen();
    render();
    if(event === 'SIGNED_IN' && !state.recovery){ syncOnAuth(); refreshPremium(); pollPremiumAfterCheckout(); resumePendingPlan(); }   // fresh sign-in → pull cloud data + Pro status
    if(event === 'SIGNED_OUT'){ state.recovery = false; clearLocalCollection().then(render); }
  });
}
// Pull the "is this account on Lumi Pro?" flag from Supabase. Safe to call even
// before the column exists — it just leaves the local value untouched on error.
// The Polar webhook (server-side) is what sets profiles.is_premium = true.
async function refreshPremium(){
  if(!state.user) return;
  try {
    const supa = await window.lumiSupaReady;
    const { data, error } = await supa.from('profiles').select('is_premium').eq('id', state.user.id).single();
    if(error) return;
    if(data && typeof data.is_premium !== 'undefined'){
      state.premium = !!data.is_premium;
      try { localStorage.setItem(PREMIUM_KEY, state.premium ? '1' : '0'); } catch(e){}
      render();
    }
  } catch(e){ /* column not added yet — ignore */ }
}
// Onboarding is tracked per-ACCOUNT (not per-device), so a brand-new user always
// picks their languages first — even on a shared browser that's been used before.
function userOnboarded(){
  if(!state.user) return false;
  try { return (JSON.parse(localStorage.getItem('lumi.onboardedUsers') || '[]')).includes(state.user.id); }
  catch(e){ return false; }
}
function markUserOnboarded(){
  if(!state.user) return;
  try {
    const l = JSON.parse(localStorage.getItem('lumi.onboardedUsers') || '[]');
    if(!l.includes(state.user.id)){ l.push(state.user.id); localStorage.setItem('lumi.onboardedUsers', JSON.stringify(l)); }
  } catch(e){}
}
// Decide which screen to show based on whether someone is signed in.
// NO LOGIN WALL: visitors can use the app first (up to FREE_LIMIT captures) and are
// only asked to sign in later — to SAVE their words and unlock Pro. So a logged-out
// person lands on onboarding/home, never a forced auth screen.
function applyAuthScreen(){
  if(state.recovery){ state.screen = 'auth'; return; }   // stay on the set-new-password screen
  if(state.screen === 'auth' || state.screen === 'loading'){
    let done;
    if(state.user){
      done = userOnboarded() || state.onboarded;                    // account-level, or already picked languages locally
      if(done && !userOnboarded()) markUserOnboarded();             // a just-signed-up visitor keeps their setup — no repeat onboarding
    } else {
      done = state.onboarded;
    }
    state.screen = done ? 'home' : 'onboarding';   // pick languages first, then capture
  }
}
function setAuthMode(mode){ state.authMode = mode; state.authError = ''; state.authNotice = ''; render(); }
// Read the form, then sign in or sign up.
async function submitAuth(){
  if(state.authBusy) return;
  const mode = state.authMode || 'signin';
  const emailEl = document.getElementById('authEmail');
  const passEl = document.getElementById('authPass');
  if(emailEl) state.authEmail = emailEl.value.trim();
  if(passEl) state.authPass = passEl.value;
  const redirectTo = location.origin + location.pathname;

  // Forgot password → email a reset link.
  if(mode === 'reset'){
    if(!state.authEmail){ state.authError = 'Enter your email first.'; render(); return; }
    state.authBusy = true; state.authError = ''; state.authNotice = ''; render();
    try {
      const supa = await window.lumiSupaReady;
      const { error } = await supa.auth.resetPasswordForEmail(state.authEmail, { redirectTo });
      state.authBusy = false;
      if(error){ state.authError = error.message; }
      else { state.authNotice = 'Check your email for a link to set a new password.'; }
      render();
    } catch(e){ state.authBusy = false; state.authError = t('auth.networkError'); render(); }
    return;
  }

  // Set a new password (after arriving from the reset link).
  if(mode === 'newpassword'){
    if(!state.authPass || state.authPass.length < 6){ state.authError = 'Password must be at least 6 characters.'; render(); return; }
    state.authBusy = true; state.authError = ''; render();
    try {
      const supa = await window.lumiSupaReady;
      const { error } = await supa.auth.updateUser({ password: state.authPass });
      state.authBusy = false;
      if(error){ state.authError = error.message; render(); return; }
      state.recovery = false; state.authMode = 'signin'; state.authPass = ''; state.authNotice = '';
      applyAuthScreen(); render();   // now signed in with the new password → into the app
    } catch(e){ state.authBusy = false; state.authError = t('auth.networkError'); render(); }
    return;
  }

  // Sign in / sign up.
  if(!state.authEmail || !state.authPass){ state.authError = 'Enter your email and password.'; render(); return; }
  if(mode === 'signup' && state.authPass.length < 6){ state.authError = 'Password must be at least 6 characters.'; render(); return; }
  state.authBusy = true; state.authError = ''; state.authNotice = ''; render();
  try {
    const supa = await window.lumiSupaReady;
    if(mode === 'signup'){
      const { data, error } = await supa.auth.signUp({ email: state.authEmail, password: state.authPass, options: { emailRedirectTo: redirectTo } });
      if(error){ state.authError = error.message || t('auth.somethingWrong'); state.authBusy = false; render(); return; }
      if(data && !data.session){
        // email confirmation is on → they must click the verification link first
        state.authBusy = false; state.authMode = 'signin'; state.authPass = '';
        state.authNotice = t('auth.verifySent', { email: state.authEmail });
        render(); return;
      }
    } else {
      const { error } = await supa.auth.signInWithPassword({ email: state.authEmail, password: state.authPass });
      if(error){ state.authError = error.message || t('auth.somethingWrong'); state.authBusy = false; render(); return; }
    }
    // success: onAuthStateChange switches screens. Clear the form.
    state.authBusy = false; state.authEmail = ''; state.authPass = '';
  } catch(e){
    state.authBusy = false; state.authError = t('auth.networkError'); render();
  }
}
async function signOut(){
  state.sheet = null;
  try { const supa = await window.lumiSupaReady; await supa.auth.signOut(); } catch(e){}
  // onAuthStateChange handles the screen switch + clearing the local copy.
}
// One-tap Google sign-in (redirects to Google, then back to the app).
async function googleSignIn(){
  state.authError = ''; state.authNotice = ''; render();
  try {
    const supa = await window.lumiSupaReady;
    const { error } = await supa.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.origin + location.pathname } });
    if(error) throw error;
  } catch(e){ state.authError = (e && e.message) || t('auth.googleFail'); render(); }
}
// Passwordless: email the person a one-time sign-in link.
async function magicLink(){
  const emailEl = document.getElementById('authEmail');
  const email = emailEl ? emailEl.value.trim() : '';
  state.authEmail = email;
  if(!email){ state.authError = t('auth.enterEmailFirst'); render(); return; }
  state.authBusy = true; state.authError = ''; state.authNotice = ''; render();
  try {
    const supa = await window.lumiSupaReady;
    const { error } = await supa.auth.signInWithOtp({ email, options: { emailRedirectTo: location.origin + location.pathname } });
    state.authBusy = false;
    if(error){ state.authError = error.message; }
    else { state.authNotice = t('auth.checkEmail'); }
    render();
  } catch(e){ state.authBusy = false; state.authError = t('auth.networkError'); render(); }
}

/* ---- 7c. Cloud sync (Supabase tables) --------------------------------- */
function cardFromRow(r){
  return { id:r.id, learning:r.learning, word:r.word, reading: r.reading || '', meaning:r.meaning, example:r.example, exampleTr: r.example_tr || '',
    cut:!!r.cut, image:r.image, createdAt: r.created_at ? Date.parse(r.created_at) : Date.now() };
}
// Pull this user's settings + collection from the cloud (the source of truth).
// Insert locally-created cards into the account, keeping example_tr/reading when those
// columns exist and gracefully retrying without them on older schemas. Returns the new rows.
async function insertLocalCards(supa, cards, META){
  const full = cards.map(c => ({ learning:c.learning, word:c.word||'', meaning:c.meaning||'', example:c.example||'', cut:!!c.cut, image:c.image||null, example_tr:c.exampleTr||null, reading:c.reading||null }));
  let { data, error } = await supa.from('cards').insert(full).select(META);
  if(error && /reading/i.test(error.message||'')){ ({ data, error } = await supa.from('cards').insert(full.map(({ reading, ...r }) => r)).select(META)); }
  if(error && /example_tr/i.test(error.message||'')){ ({ data, error } = await supa.from('cards').insert(full.map(({ reading, example_tr, ...r }) => r)).select(META)); }
  if(error){ console.warn('merge insert failed:', error.message || error); return []; }
  return data || [];
}
async function syncOnAuth(){
  if(!state.user) return;
  let supa; try { supa = await window.lumiSupaReady; } catch(e){ return; }
  try {
    const { data: prof } = await supa.from('profiles').select('spoken,learning,theme').eq('id', state.user.id).maybeSingle();
    if(prof){
      if(prof.spoken && canSpeak(prof.spoken)) state.spoken = prof.spoken;
      if(prof.learning) state.learning = prof.learning;
      if(prof.theme) state.theme = prof.theme;
      saveSettings();
    }
    // EGRESS-SAVER: pull card TEXT only (no big base64 image blobs) and reuse images we
    // already have on this device. A card's image never changes after it's created, so we
    // download each image only ONCE per device instead of re-downloading the whole
    // collection on every load — this is the main thing that was eating Supabase bandwidth.
    const localImg = {};    // id -> base64 data URL we can display directly (offline-friendly)
    const localPath = {};   // id -> private storage path (re-signed to a short-lived URL each load)
    Object.keys(state.journals).forEach(code => (state.journals[code]||[]).forEach(c => {
      if(!c) return;
      if(c.image && String(c.image).indexOf('data:') === 0) localImg[String(c.id)] = c.image;
      if(c.imagePath) localPath[String(c.id)] = c.imagePath;
    }));

    const META = 'id,learning,word,reading,meaning,example,example_tr,cut,created_at';
    let { data: rows } = await supa.from('cards').select(META).eq('user_id', state.user.id).order('created_at', { ascending:false });
    rows = rows || [];
    // Save words captured BEFORE signing in: push locally-created cards (local "c…" ids)
    // that the cloud doesn't already have, so a visitor's trial words land in their new
    // account. Dedup by learning|word so re-syncing never duplicates. Covers both a brand-new
    // empty account and signing into an existing one.
    const cloudKey = new Set(rows.map(r => r.learning + '|' + (r.word || '').trim().toLowerCase()));
    const localOnly = [];
    Object.keys(state.journals).forEach(code => (state.journals[code] || []).forEach(c => {
      if(!c || !/^c\d/.test(String(c.id))) return;                 // only unsynced, locally-created cards
      const k = c.learning + '|' + (c.word || '').trim().toLowerCase();
      if(cloudKey.has(k)) return;
      cloudKey.add(k); localOnly.push(c);
    }));
    if(localOnly.length){
      const ins = await insertLocalCards(supa, localOnly, META);   // preserves example_tr/reading, with column fallbacks
      if(ins.length){ rows = ins.concat(rows); state._justMerged = localOnly.length; }
    }

    // Fetch the image REFERENCE (a tiny path, or legacy base64) only for cards we know nothing about locally.
    const fetched = {};
    const missing = rows.filter(r => !localImg[String(r.id)] && !localPath[String(r.id)]).map(r => r.id);
    for(let i = 0; i < missing.length; i += 200){
      const { data: imgs } = await supa.from('cards').select('id,image').in('id', missing.slice(i, i + 200));
      (imgs||[]).forEach(r => { if(r.image) fetched[String(r.id)] = r.image; });
    }

    const journals = {}; LANGS.forEach(l => journals[l.code] = []);
    rows.forEach(r => {
      const id = String(r.id);
      const card = cardFromRow(r);
      if(localImg[id]){ card.image = localImg[id]; card.imagePath = localPath[id] || card.imagePath; }   // reuse local base64
      else if(localPath[id]){ card.imagePath = localPath[id]; card.image = ''; }                          // known path → signed below
      else {
        const ref = fetched[id];
        if(ref && String(ref).indexOf('data:') === 0){ card.image = ref; }                                // legacy base64 in the DB
        else if(ref && String(ref).indexOf('http') === 0){ card.image = ref; }                            // legacy public URL
        else if(ref){ card.imagePath = ref; card.image = ''; }                                             // private storage path → signed below
        else { card.image = null; }
      }
      (journals[r.learning] = journals[r.learning] || []).push(card);
    });
    LANGS.forEach(l => journals[l.code].sort((a,b) => b.createdAt - a.createdAt));
    state.journals = journals;
    idbSet(JOURNALS_KEY, state.journals).catch(()=>{});   // keep a local cache
    render();
    if(state._justMerged){ showToast(t('toast.merged', { w: nWords(state._justMerged) }), true); state._justMerged = 0; }
    resolveCardImages();                                  // sign private-path images so they display
    setTimeout(() => migrateImagesToStorage(), 4000);     // one-time: move old base64/public images into the private bucket
  } catch(e){ console.warn('Sync failed (using local copy):', e); }
}
// One-time migration: for each card that still holds its image LOCALLY as base64 (the
// device that created it always does), upload that base64 into the private bucket and
// replace the DB row's image with the tiny path. Works off the local copy, so it never
// re-downloads the base64 it's replacing. Fully safe: the row is only changed AFTER a
// successful upload (no image can be lost), and each card is migrated once (tracked).
let _migrating = false;
async function migrateImagesToStorage(){
  if(_migrating || !state.user) return;
  _migrating = true;
  try {
    let done;
    try { done = new Set(JSON.parse(localStorage.getItem('lumi.imgMigrated') || '[]')); } catch(e){ done = new Set(); }
    const supa = await window.lumiSupaReady;
    const todo = [];
    Object.keys(state.journals).forEach(code => (state.journals[code]||[]).forEach(c => {
      if(c && !c.imagePath && c.image && String(c.image).indexOf('data:') === 0 && !done.has(String(c.id))) todo.push(c);
    }));
    for(const c of todo){
      const path = await uploadCardImage(c.image);              // uploads the local base64, returns a path
      if(path){
        await supa.from('cards').update({ image: path }).eq('id', c.id);
        c.imagePath = path;                                     // keep c.image as the base64 for instant/offline display
        done.add(String(c.id));
        try { localStorage.setItem('lumi.imgMigrated', JSON.stringify([...done])); } catch(e){}
      }
      await new Promise(r => setTimeout(r, 150));               // gentle throttle
    }
    if(todo.length) saveStore();
  } catch(e){ console.warn('image migration:', e); }
  _migrating = false;
}
// Save settings to the cloud profile too.
async function syncProfile(){
  if(!state.user) return;
  try {
    const supa = await window.lumiSupaReady;
    const base = { id: state.user.id, spoken: state.spoken, learning: state.learning, theme: state.theme, updated_at: new Date().toISOString() };
    let r = await supa.from('profiles').upsert({ ...base, email: state.user.email || null });
    if(r.error && /email/i.test(r.error.message || '')){ await supa.from('profiles').upsert(base); }  // email column not added yet
  } catch(e){ console.warn('profile sync failed', e); }
}
// Wipe the on-device copy (called on sign-out so the next account starts clean).
async function clearLocalCollection(){
  state.journals = {}; LANGS.forEach(l => state.journals[l.code] = []);
  try { await idbSet(JOURNALS_KEY, state.journals); } catch(e){}
}

  const learnPill = t('result.learningLabel') + ' · ' + langOf(state.learning).native;
  const badge = (state.journals[state.learning]||[]).length;
  const bg = cur.photo ? `url('${cur.photo}') center/cover` : '#c9ccc6';
  let floatEl;
  if(cur.cutout){
    const obj = cutoutImg(cur.cutout, 210, 250, 2.5);
    floatEl = state.reveal
      ? `<div style="animation:lumiReveal .5s cubic-bezier(.2,.9,.3,1) both, lumiGlow .9s ease-out .05s 1">${obj}</div>`
      : obj;
  } else {
    floatEl = cur.photo ? `<div style="${photoFrame(cur.photo, 200, 234)}"></div>` : '';

  let card;
  if(cur.found){
    const saveStyle = css({ flex:'1', height:'54px', borderRadius:'27px', fontSize:'15.5px', fontWeight:'600',

// word / meaning / example for a card (handles legacy sample cards).
function cardWME(card){
  const o = card.objKey ? OBJECTS[card.objKey] : null;
  return {
    o,
    word: card.word || (o ? o.forms[card.learning] : ''),
    meaning: card.meaning || (o ? o.forms[state.spoken] : ''),
    example: card.example || (o ? o.ex[card.learning] : ''),
    exampleTr: card.exampleTr || '',
    reading: card.reading || '',
  };
}
function cardThumb(card, size){
  const o = card.objKey ? OBJECTS[card.objKey] : null;
  if(card.image){
    return card.cut
      ? `<div style="height:${size}px;display:flex;align-items:center;justify-content:center">${cutoutImg(card.image, size, size, 1.6)}</div>`

  return o ? `<div style="${stickerStyle(card.objKey, Math.round(size*0.84))}"><span style="${labelStyle(true)}">${esc(o.label)}</span></div>` : '';
}

            ${readingOf(word, card.learning, card.reading) ? `<div style="font-size:12.5px;color:var(--ink-soft);text-align:center;letter-spacing:.2px;margin-top:-7px">${esc(readingOf(word, card.learning, card.reading))}</div>` : ''}
          </div>
          <div style="${back}">
            <div style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft)">${esc(t('card.means'))}</div>
            <div style="font-family:'Fraunces','Noto Serif','Noto Serif SC','Noto Serif JP','Noto Serif KR',serif;font-size:22px;font-weight:500;color:var(--ink);line-height:1.05;margin-top:3px">${esc(meaning)}</div>

const CATEGORIES = [
  { key:'Animals', label:'Animals', emoji:'🐾' },
  { key:'Plants', label:'Plants', emoji:'🌿' },
  { key:'Food & Drink', label:'Food & Drink', emoji:'🍎' },
  { key:'Clothing', label:'Clothing', emoji:'👕' },
  { key:'Objects', label:'Objects', emoji:'📦' },
  { key:'People', label:'People', emoji:'🧑' },
  { key:'Vehicles', label:'Vehicles', emoji:'🚗' },
  { key:'Buildings & Places', label:'Places', emoji:'🏠' },
  { key:'Nature', label:'Nature', emoji:'🏞️' },
  { key:'Other', label:'Other', emoji:'✨' },
];
// Category key → translation key (the AI returns the English keys above).
const CAT_TK = { 'Animals':'cat.Animals', 'Plants':'cat.Plants', 'Food & Drink':'cat.Food', 'Clothing':'cat.Clothing', 'Objects':'cat.Objects', 'People':'cat.People', 'Vehicles':'cat.Vehicles', 'Buildings & Places':'cat.Places', 'Nature':'cat.Nature', 'Other':'cat.Other' };
function catLabel(cat){ return t(CAT_TK[cat.key] || 'cat.Other'); }
let _classifying = false;
async function classifyMissing(cards){
  if(_classifying) return;
  const missing = cards.filter(c => !c.category);
  if(!missing.length) return;
  _classifying = true;
  try {
    const items = missing.map(c => (((c.meaning||'') + (c.word ? ' / ' + c.word : '')).trim()) || c.word || '');
    const r = await fetch('/api/categorize', { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ items }) });
    const cats = (await r.json()).categories || [];
    missing.forEach((c, i) => { c.category = cats[i] || 'Other'; });
  } catch(e){ missing.forEach(c => { c.category = c.category || 'Other'; }); }
  _classifying = false;
  saveStore();
  if(state.screen === 'journal' && state.journalMode === 'categories') render();
}
function categoriesBody(cards){
  if(cards.some(c => !c.category)){
    classifyMissing(cards);
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:64px 40px;min-height:38vh">
        <div style="width:34px;height:34px;border-radius:50%;border:3px solid var(--glass-brd);border-top-color:var(--ink);animation:lumiSpin .8s linear infinite"></div>
        <div style="font-size:14px;color:var(--ink-soft)">${esc(t('cat.sorting'))}</div>
      </div>`;
  }
  const groups = {};
  cards.forEach(c => { const k = CATEGORIES.some(x => x.key === c.category) ? c.category : 'Other'; (groups[k] = groups[k] || []).push(c); });
  const sections = CATEGORIES.filter(cat => (groups[cat.key]||[]).length).map(cat => {
    const list = groups[cat.key];
    return `<div style="margin-top:8px">
        <div style="display:flex;align-items:center;gap:9px;padding:8px max(16px,4vw) 2px">
          <span style="font-size:19px">${cat.emoji}</span>
          <span style="font-family:'Fraunces','Noto Serif','Noto Serif SC','Noto Serif JP','Noto Serif KR',serif;font-weight:500;font-size:19px;color:var(--ink)">${esc(catLabel(cat))}</span>
          <span style="font-size:12px;font-weight:600;color:var(--ink-soft);background:var(--glass);border:1px solid var(--glass-brd);border-radius:11px;padding:1px 9px">${list.length}</span>
        </div>
        ${cardsBody(list)}
      </div>`;
  }).join('');
  return `<div style="padding-bottom:24px">${sections}</div>`;
}

// ---- Daily review nudge (a gentle "come back tomorrow" routine) ----
function todayKey(){ const d = new Date(); return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }
function reviewedToday(){ try { return localStorage.getItem('lumi.lastReviewDay') === todayKey(); } catch(e){ return false; } }
function markReviewedToday(){ try { localStorage.setItem('lumi.lastReviewDay', todayKey()); } catch(e){} }
// How many words are waiting for today's review (0 = hide the nudge).
function reviewDueToday(){
  if(reviewedToday() || state.reviewHidden === todayKey()) return 0;
  return (state.journals[state.learning] || []).length;
}

// ---- Review (Tinder-style swipe) ----
function startReviewSession(cards){
  const ids = cards.map(c => c.id);
  for(let i = ids.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); const t = ids[i]; ids[i] = ids[j]; ids[j] = t; }
  state.review = { lang: state.learning, queue: ids, total: ids.length, known: 0, flip: false, done: false };
}
function reviewSwipe(dir){
  const rv = state.review; if(!rv) return;
  const id = rv.queue.shift();
  if(dir === 'dont'){ rv.queue.push(id); } else { rv.known++; }
  rv.flip = false;
  if(rv.queue.length === 0){ rv.done = true; markReviewedToday(); }
  render();
}
function reviewButton(dir){
  const card = document.querySelector('.reviewcard');
  if(card){
    card.style.transition = 'transform .3s ease, opacity .3s ease';
    card.style.transform = `translate(${dir==='know'?700:-700}px,0) rotate(${dir==='know'?22:-22}deg)`;
    card.style.opacity = '0';
    setTimeout(() => reviewSwipe(dir), 240);
  } else { reviewSwipe(dir); }
}
function rvSetFlip(card, flip){
  if(!card || !state.review) return;
  const inner = card.querySelector('.rv-inner'), front = card.querySelector('.rv-front'), back = card.querySelector('.rv-back');
  if(inner) inner.style.transform = flip ? 'rotateY(180deg)' : 'rotateY(0deg)';
  if(front) front.style.opacity = flip ? '0' : '1';
  if(back) back.style.opacity = flip ? '1' : '0';
  state.review.flip = flip;
}
function reviewBody(cards){
  if(!state.review || state.review.lang !== state.learning) startReviewSession(cards);
  const rv = state.review;
  rv.queue = rv.queue.filter(id => cards.some(c => String(c.id) === String(id)));
  if(rv.queue.length === 0) rv.done = true;
  const learnNat = langOf(state.learning).native;

  if(rv.done){
    markReviewedToday();
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 40px;gap:16px;min-height:56vh">
        <div style="font-size:46px">🎉</div>
        <div style="font-family:'Fraunces','Noto Serif','Noto Serif SC','Noto Serif JP','Noto Serif KR',serif;font-size:26px;font-weight:500;color:var(--ink)">${esc(t('review.doneTitle'))}</div>
        <div style="font-size:14.5px;color:var(--ink-soft);max-width:250px;line-height:1.5">${esc(t('review.doneSub', { w: nWords(rv.total), lang: learnNat }))}</div>
        <button data-action="reviewAgain" style="margin-top:6px;height:50px;padding:0 28px;border-radius:25px;background:var(--cta);color:var(--cta-ink);font-weight:600;font-size:15px">${esc(t('review.again'))}</button>
      </div>`;
  }

  const card = cards.find(c => String(c.id) === String(rv.queue[0]));
  const { word, meaning, example, exampleTr, reading } = cardWME(card);
  prefetchTTS(word, state.learning);   // warm audio so the ♪ tap is instant
  const progress = rv.total ? Math.round((rv.known / rv.total) * 100) : 0;
  const fl = rv.flip;

/* ---- Share a card as an image (save to camera roll / post to social) --- */
function roundRectPath(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
// Wrap text to a max pixel width. Breaks on spaces, or per-character for CJK.
function wrapCanvasText(ctx, text, maxWidth){
  text = String(text || '').trim();
  if(!text) return [];
  const cjk = /[　-鿿぀-ヿ가-힯]/.test(text);
  const lines = [];
  let line = '';
  const units = (cjk && !/\s/.test(text)) ? Array.from(text) : text.split(/\s+/);
  const join = (cjk && !/\s/.test(text)) ? '' : ' ';
  for(const u of units){
    const test = line ? line + join + u : u;
    if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = u; }
    else line = test;
  }
  if(line) lines.push(line);
  return lines;
}
function loadImage(src){ return new Promise((res, rej) => { const i = new Image(); i.crossOrigin = 'anonymous'; i.onload = () => res(i); i.onerror = () => rej(new Error('img')); i.src = src; }); }

async function renderShareCanvas(c){
  const word = c.word || '', meaning = c.meaning || '', example = c.example || '', exampleTr = c.exampleTr || '';
  const reading = readingOf(word, c.learning, c.reading);
  try { await Promise.all([
    document.fonts.load("500 92px 'Fraunces'"), document.fonts.load("italic 500 48px 'Fraunces'"),
    document.fonts.load("500 46px 'Hanken Grotesk'"), document.fonts.load("600 60px 'Noto Serif SC'"),
    document.fonts.load("600 60px 'Noto Serif JP'"), document.fonts.load("600 60px 'Noto Serif KR'"),
  ]); } catch(_){}

  const W = 1080, H = 1350;
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  // Soft green "Meadow" frame (matches the app) around a warm-white card.
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#dfe7db'); bg.addColorStop(0.5, '#ccd8c2'); bg.addColorStop(1, '#b6c5a3');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  const px = 58, py = 58, pw = W - px*2, ph = H - py*2, pr = 56;
  ctx.save();
  ctx.shadowColor = 'rgba(45,60,45,0.22)'; ctx.shadowBlur = 60; ctx.shadowOffsetY = 26;
  roundRectPath(ctx, px, py, pw, ph, pr);
  ctx.fillStyle = '#fbfcf9'; ctx.fill();
  ctx.restore();
  // Delicate sage hairline just inside the edge — a subtle ornament, on-brand.
  roundRectPath(ctx, px + 16, py + 16, pw - 32, ph - 32, pr - 14);
  ctx.strokeStyle = 'rgba(120,150,108,0.45)'; ctx.lineWidth = 2.5; ctx.stroke();

  const cx = W/2, maxTextW = pw - 160, serif = "'Fraunces','Noto Serif','Noto Serif SC','Noto Serif JP','Noto Serif KR',serif";

  // --- Measure the text (at full size) so we can give the image a clear gap and only
  //     shrink the fonts when space is genuinely tight. ---
  ctx.textAlign = 'center';
  ctx.font = `500 92px ${serif}`;                     const wordLines = wrapCanvasText(ctx, word, maxTextW);
  ctx.font = "500 46px 'Hanken Grotesk',sans-serif";  const meaningLines = meaning ? wrapCanvasText(ctx, meaning, maxTextW) : [];
  ctx.font = `italic 500 48px ${serif}`;              const exLines = example ? wrapCanvasText(ctx, example, maxTextW).slice(0, 4) : [];
  ctx.font = "400 36px 'Hanken Grotesk',sans-serif";  const trLines = exampleTr ? wrapCanvasText(ctx, exampleTr, maxTextW).slice(0, 2) : [];

  // Top-anchored line-heights for each block.
  const WORD_LH = 100, WORD_AFTER = 10, READ_LH = 56, MEAN_LH = 58, DIV_BEFORE = 28, DIV_AFTER = 32, EX_LH = 62, TR_LH = 46;
  const readingH = reading ? READ_LH : 0;
  const divH = exLines.length ? DIV_BEFORE + DIV_AFTER : 0;
  const textH = wordLines.length*WORD_LH + WORD_AFTER + readingH + meaningLines.length*MEAN_LH + divH + exLines.length*EX_LH + trLines.length*TR_LH;

  const contentTop = py + 84, contentBottom = py + ph - 130;   // reserve the bottom for the watermark
  const avail = contentBottom - contentTop;
  const GAP = 50;                          // clear breathing room between the image and the word
  const MAX_IMG = 500, MIN_IMG = 200;
  const gap = c.image ? GAP : 0;

  // Fit [image + gap + text] into the available height: shrink the image first, then the fonts.
  let imgBoxH = c.image ? MAX_IMG : 0, s = 1;
  if(imgBoxH + gap + textH > avail){
    imgBoxH = Math.max(c.image ? MIN_IMG : 0, avail - gap - textH);
    if(imgBoxH + gap + textH > avail) s = Math.max(0.6, (avail - gap - imgBoxH) / textH);
  }

  let y = contentTop;
  // --- Draw the image ---
  if(c.image){
    try {
      const im = await loadImage(c.image);
      const boxW = pw - 220;
      const scale = Math.min(boxW/im.naturalWidth, imgBoxH/im.naturalHeight, 2.4);
      const iw = im.naturalWidth*scale, ih = im.naturalHeight*scale;
      const ix = cx - iw/2, iy = y;
      ctx.save();
      ctx.shadowColor = 'rgba(35,45,40,0.28)'; ctx.shadowBlur = 46; ctx.shadowOffsetY = 22;
      if(c.cut){ ctx.drawImage(im, ix, iy, iw, ih); }
      else { roundRectPath(ctx, ix, iy, iw, ih, 30); ctx.clip(); ctx.drawImage(im, ix, iy, iw, ih); }
      ctx.restore();
      y = iy + ih + GAP;                   // a clear, exact gap below the ACTUAL image bottom
    } catch(e){ y += 24; }
  }

  // --- Draw the text top-anchored (so the gap above is exact); fonts scaled by s if tight. ---
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const fs = (n) => Math.round(n * s);
  ctx.fillStyle = '#1d2329'; ctx.font = `500 ${fs(92)}px ${serif}`;
  for(const ln of wordLines){ ctx.fillText(ln, cx, y); y += WORD_LH*s; }
  y += WORD_AFTER*s;
  if(reading){ ctx.fillStyle = 'rgba(29,35,41,0.55)'; ctx.font = `400 ${fs(40)}px 'Hanken Grotesk',sans-serif`; ctx.fillText(reading, cx, y); y += READ_LH*s; }
  if(meaningLines.length){ ctx.fillStyle = 'rgba(29,35,41,0.64)'; ctx.font = `500 ${fs(46)}px 'Hanken Grotesk',sans-serif`; for(const ln of meaningLines){ ctx.fillText(ln, cx, y); y += MEAN_LH*s; } }
  if(exLines.length){
    y += DIV_BEFORE*s;
    ctx.strokeStyle = 'rgba(29,35,41,0.16)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-90, y); ctx.lineTo(cx+90, y); ctx.stroke();
    y += DIV_AFTER*s;
    ctx.fillStyle = '#1d2329'; ctx.font = `italic 500 ${fs(48)}px ${serif}`;
    for(const ln of exLines){ ctx.fillText(ln, cx, y); y += EX_LH*s; }
  }
  if(trLines.length){ ctx.fillStyle = 'rgba(29,35,41,0.5)'; ctx.font = `400 ${fs(36)}px 'Hanken Grotesk',sans-serif`; for(const ln of trLines){ ctx.fillText(ln, cx, y); y += TR_LH*s; } }
  ctx.textBaseline = 'alphabetic';         // reset for the watermark below

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(45,60,42,0.82)'; ctx.font = `600 48px ${serif}`;
  ctx.fillText('Lumi', cx, py + ph - 66);
  ctx.fillStyle = 'rgba(45,60,42,0.42)'; ctx.font = "600 26px 'Hanken Grotesk',sans-serif";
  ctx.fillText('lumiwords.com', cx, py + ph - 32);
  return cv;
}

let _shareBlob = null;
async function shareCardObj(c){
  showToast(t('toast.preparingImage'), true);
  try {
    const cv = await renderShareCanvas(c);
    // JPEG: smaller + universally saveable (iOS "Save Image" is happiest with it).
    const blob = await new Promise(res => cv.toBlob(res, 'image/jpeg', 0.92));
    if(!blob) throw new Error('no blob');
    _shareBlob = blob;
    clearTimeout(timers._toast); state.toast = null;
    state.share = { url: cv.toDataURL('image/jpeg', 0.92), word: c.word || 'card' };
    render();
  } catch(e){ console.warn('share render failed', e); showToast(t('toast.imageFail'), false); }
}
function shareCard(id){
  const card = findCard(id); if(!card) return;
  state.sheet = null;
  const w = cardWME(card);
  shareCardObj({ word:w.word, meaning:w.meaning, example:w.example, exampleTr:w.exampleTr, reading:w.reading, image:card.image, cut:card.cut, learning:card.learning });
}
function shareFilename(word){ return 'lumi-' + ((word || '').replace(/[^a-z0-9]+/gi, '-').toLowerCase().replace(/^-+|-+$/g, '').slice(0, 28) || 'card') + '.jpg'; }

// Pre-render the current result's share image in the background so tapping
// "Share as image" can open the phone's NATIVE share sheet instantly (Save Image /
// Save to Files / AirDrop / …) — iOS won't open it after an async delay, so the
// image must already be ready inside the tap.
let _sharePrep = { key: null, blob: null, url: null };
async function prepareShare(c){
  const key = (c.learning || '') + '|' + (c.word || '') + '|' + (c.cut ? 'c' : 'p');   // re-render if the cut-out arrives later
  if(!c.word || _sharePrep.key === key) return;   // already prepared (or nothing to do)
  _sharePrep = { key, blob: null, url: null };     // claim it so we render only once
  try {
    const cv = await renderShareCanvas(c);
    const blob = await new Promise(res => cv.toBlob(res, 'image/jpeg', 0.92));
    if(blob && _sharePrep.key === key){ _sharePrep.blob = blob; _sharePrep.url = cv.toDataURL('image/jpeg', 0.92); }
  } catch(e){ /* fall back to on-demand render in shareCurrent */ }
}
function shareCurrent(){
  const cur = state.current; if(!cur || !cur.found) return;
  const key = (cur.learning || '') + '|' + (cur.word || '') + '|' + (cur.cutout ? 'c' : 'p');
  // If the image is pre-rendered and this phone can share files → open the native
  // share sheet DIRECTLY (no intermediate screen), so "Save Image" sits in the list.
  if(_sharePrep.key === key && _sharePrep.blob && navigator.canShare && navigator.share){
    const file = new File([_sharePrep.blob], shareFilename(cur.word), { type: 'image/jpeg' });
    if(navigator.canShare({ files: [file] })){
      _shareBlob = _sharePrep.blob;
      navigator.share({ files: [file] }).catch(e => {
        if(e && e.name === 'AbortError') return;             // user dismissed the sheet
        state.share = { url: _sharePrep.url, word: cur.word }; render();   // show preview as fallback
      });
      return;
    }
  }
  // Not ready / can't share files → the preview overlay (with long-press-to-save).
  shareCardObj({ word:cur.word, meaning:cur.meaning, example:cur.example, exampleTr:cur.exampleTr, reading:cur.reading, image:cur.cutout||cur.photo, cut:!!cur.cutout, learning:cur.learning });
}
async function shareNow(){
  if(!_shareBlob) return;
  const word = (state.share && state.share.word) || 'card';
  const fname = shareFilename(word);
  const file = new File([_shareBlob], fname, { type: 'image/jpeg' });
  try {
    // Share ONLY the file (no title/text) — on iOS, adding text makes it a "text
    // share" and hides the "Save Image" (camera roll) option.
    if(navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({ files: [file] });
      return;
    }
  } catch(e){ if(e && e.name === 'AbortError') return; }
  try {
    const url = URL.createObjectURL(_shareBlob);
    const a = document.createElement('a'); a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    showToast(t('toast.imageSaved'), true);
  } catch(e){ showToast(t('toast.saveFail'), false); }
}
function closeShare(){ state.share = null; _shareBlob = null; render(); }

  return `<div data-action="closeShare" style="position:absolute;inset:0;background:rgba(18,22,22,.64);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:26px;animation:fadeIn .2s ease">

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v14"/></svg>
        ${canShare ? esc(t('share.shareSave')) : esc(t('share.saveImage'))}

      <button data-action="closeShare" style="height:54px;padding:0 24px;border-radius:27px;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.5);color:#fff;font-size:15px;font-weight:600;white-space:nowrap">${esc(t('share.close'))}</button>

    <div style="font-size:12.5px;color:rgba(255,255,255,.78);text-align:center;max-width:300px;line-height:1.55"><b>${esc(t('share.saveTitle'))}</b> ${t('share.saveHint')}<br>${t('share.postAnywhere', { word: canShare ? t('share.share') : t('share.save') })}</div>
  </div>`;

function toastView(){
  if(!state.toast) return '';
  const t = state.toast;
  const badge = t.good
    ? `<span style="width:19px;height:19px;border-radius:50%;background:#6fcf9a;color:#0a3b25;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">✓</span>`
    : `<span style="width:19px;height:19px;border-radius:50%;background:#f0c36d;color:#3b2a0a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800">!</span>`;
  return `<div style="position:absolute;left:50%;top:58px;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:9px;padding:12px 20px;border-radius:26px;background:var(--cta);color:var(--cta-ink);font-size:14px;font-weight:600;box-shadow:0 16px 36px -14px rgba(20,24,24,.5);max-width:90%;animation:fadeIn .25s ease">
    ${badge}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.msg)}</span></div>`;
}

/* ---- 9. The master render: build the screen from the current state ----- */
function render(){
  const app = document.getElementById('app');

  // apply theme variables onto the page root (so the body backdrop can use
  // them on laptops) and onto #app, plus the photo-blur value.
  const t = theme();
  Object.entries(t).forEach(([k,v]) => {
    document.documentElement.style.setProperty(k, v);
    app.style.setProperty(k, v);
  });
  app.style.setProperty('--photo-blur', '20px');

  let screenHtml = '';
  switch(state.screen){
    case 'loading':    screenHtml = loadingView(); break;
    case 'auth':       screenHtml = authView(); break;
    case 'onboarding': screenHtml = onboardingView(); break;
    case 'home':       screenHtml = homeView(); break;
    case 'processing': screenHtml = processingView(); break;
    case 'result':     screenHtml = resultView(); break;
    case 'journal':    screenHtml = journalView(); break;
    case 'upgrade':    screenHtml = upgradeView(); break;
  }

  // The sheet/toast don't belong on the loading or auth screens.
  const overlays = (state.screen === 'auth' || state.screen === 'loading') ? '' : (sheetView() + shareView() + toastView());
  app.innerHTML = statusBar() + screenHtml + overlays;
}

/* ---- 10. One click handler for the whole app (event delegation) -------- */
