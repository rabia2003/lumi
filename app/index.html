  editSpoken:        () => openSheet('switch','spoken'),
  editLearning:      () => openSheet('switch','learning'),
  continue:          () => beginOnboarding(),
  settings:          () => openSheet('settings'),
  journal:           () => { state.journalMode = 'cards'; state.review = null; go('journal'); },
  openSwitchLearning:() => openSheet('switch','learning'),
  capture:           () => { if(atFreeLimit()){ go('upgrade'); return; } openCamera(); },
  upload:            () => { if(atFreeLimit()){ go('upgrade'); return; } openFilePicker(); },
  goUpgrade:         () => go('upgrade'),
  upgradeClose:      () => go('home'),
  buyAnnual:         () => startCheckout('annual', POLAR_ANNUAL_URL),
  buyMonthly:        () => startCheckout('monthly', POLAR_MONTHLY_URL),
  goAuthSave:        () => { state.authMode = 'signup'; state.authError = ''; state.authNotice = t('auth.saveNotice'); go('auth'); },
  authSkip:          () => { state.authNotice = ''; state.authError = ''; go(state.onboarded ? 'home' : 'onboarding'); },
  manageSub:         () => { if(POLAR_PORTAL_URL){ window.open(POLAR_PORTAL_URL, '_blank'); } else { showToast(t('toast.subManage'), false); } },
  close:             () => go('home'),
  retake:            () => openCamera(),

  speak:             () => { if(state.current) speak(state.current.word, state.current.learning); },
  speakText:         (el) => speak(el.getAttribute('data-word'), el.getAttribute('data-lang')),
  journalCapture:    () => go('home'),
  closeSheet:        () => closeSheet(),
  pickLang:          (el) => pickLang(el.getAttribute('data-code')),
  flip:              (el) => toggleFlip(el.getAttribute('data-id')),
  editCard:          (el) => openEditCard(el.getAttribute('data-id')),
  saveCardEdit:      () => saveCardEdit(),
  editFromActions:   () => openEditCard(state.sheetTarget),
  askDelete:         () => { state.cardDeleteConfirm = true; render(); },
  cancelDelete:      () => { state.cardDeleteConfirm = false; render(); },
  confirmDelete:     () => deleteCard(state.sheetTarget),
  setJMode:          (el) => { const m = el.getAttribute('data-mode'); state.journalMode = m; if(m === 'review') startReviewSession(state.journals[state.learning]||[]); render(); },
  startDailyReview:  () => { state.journalMode = 'review'; state.review = null; startReviewSession(state.journals[state.learning]||[]); go('journal'); },

  authReset:         () => setAuthMode('reset'),
  authSignin:        () => setAuthMode('signin'),
  signOut:           () => signOut(),
};
// Submit the sign-in form with the Enter key.
document.getElementById('app').addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && state.screen === 'auth' && (e.target.id === 'authEmail' || e.target.id === 'authPass')){
    e.preventDefault(); submitAuth();
  }
});
document.getElementById('app').addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const fn = ACTIONS[el.getAttribute('data-action')];
  if(fn) fn(el);

// Long-press (touch) or right-click (desktop) on a collection card → Edit / Delete.
(function(){
  const appEl = document.getElementById('app');
  const cardOf = (e) => e.target.closest('[data-action="flip"]');
  let timer = null, start = null;
  appEl.addEventListener('touchstart', (e) => {
    const card = cardOf(e); if(!card) return;
    const id = card.getAttribute('data-id'), t = e.touches[0];
    start = { x:t.clientX, y:t.clientY };
    clearTimeout(timer);
    timer = setTimeout(() => { timer = null; _lpAt = Date.now(); openCardActions(id); try { navigator.vibrate && navigator.vibrate(12); } catch(_){} }, 480);
  }, { passive:true });
  appEl.addEventListener('touchmove', (e) => {
    if(!timer || !start) return;
    const t = e.touches[0];
    if(Math.abs(t.clientX-start.x) + Math.abs(t.clientY-start.y) > 10){ clearTimeout(timer); timer = null; }
  }, { passive:true });
  const cancel = () => { clearTimeout(timer); timer = null; start = null; };
  appEl.addEventListener('touchend', cancel, { passive:true });
  appEl.addEventListener('touchcancel', cancel, { passive:true });
  // swallow the click the OS fires right after a long-press (so it neither flips nor closes the sheet)
  appEl.addEventListener('click', (e) => { if(Date.now() - _lpAt < 700){ e.stopPropagation(); e.preventDefault(); _lpAt = 0; } }, true);
  appEl.addEventListener('contextmenu', (e) => {
    const card = cardOf(e); if(!card) return;
    e.preventDefault(); openCardActions(card.getAttribute('data-id'));
  });
})();

// Review (Tinder-style) cards: tap = flip, swipe = know/again. Uses Pointer
// Events with pointer capture so tap/swipe detection is reliable on touch (the
// old code moved the card on any micro-movement, which suppressed the tap on
// phones). The card only starts moving past a real drag threshold, so a tap
// stays a clean tap and always flips.
(function(){
  const appEl = document.getElementById('app');
  let d = null;
  const DRAG = 10, TAP = 14, SWIPE = 80;
  const inReview = () => state.screen === 'journal' && (state.journalMode||'cards') === 'review';
  appEl.addEventListener('pointerdown', (e) => {
    if(!inReview()) return;
    if(e.target.closest('button')) return;   // let the ♪ (and other) buttons work without flipping/dragging
    const card = e.target.closest('.reviewcard'); if(!card) return;
    d = { sx:e.clientX, sy:e.clientY, card, dx:0, moved:0, id:e.pointerId, dragging:false };
    try { card.setPointerCapture(e.pointerId); } catch(_){}
    card.style.transition = 'none';
  });
  appEl.addEventListener('pointermove', (e) => {
    if(!d || e.pointerId !== d.id) return;
    const dx = e.clientX - d.sx, dy = e.clientY - d.sy;
    d.dx = dx; d.moved = Math.max(d.moved, Math.abs(dx) + Math.abs(dy));
    if(d.moved < DRAG) return;                 // still within tap range → don't move the card
    d.dragging = true;
    d.card.style.transform = `translate(${dx}px, ${dy*0.16}px) rotate(${dx*0.05}deg)`;
    const like = d.card.querySelector('.rv-like'), nope = d.card.querySelector('.rv-nope');
    if(like) like.style.opacity = Math.max(0, Math.min(1, dx/90));
    if(nope) nope.style.opacity = Math.max(0, Math.min(1, -dx/90));
  });
  const end = (e) => {
    if(!d || (e && e.pointerId !== d.id)) return;
    const { dx, moved, card } = d; d = null;
    if(Math.abs(dx) > SWIPE){
      const dir = dx > 0 ? 'know' : 'dont';
      card.style.transition = 'transform .3s ease, opacity .3s ease';
      card.style.transform = `translate(${dx>0?700:-700}px,0) rotate(${dx>0?22:-22}deg)`;
      card.style.opacity = '0';
      setTimeout(() => reviewSwipe(dir), 240);
    } else if(moved < TAP){                     // a tap → flip
      card.style.transition = 'transform .25s ease'; card.style.transform = '';
      rvSetFlip(card, !state.review.flip);
    } else {                                     // partial drag → settle back, no flip
      card.style.transition = 'transform .25s ease'; card.style.transform = '';
      const like = card.querySelector('.rv-like'), nope = card.querySelector('.rv-nope');
      if(like) like.style.opacity = 0; if(nope) nope.style.opacity = 0;
    }
  };
  appEl.addEventListener('pointerup', end);
  appEl.addEventListener('pointercancel', end);
})();

/* ---- 11. When a real photo is picked: compress it, then run capture ---- */
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if(!file) return;                       // user cancelled the picker
  try {
    const photo = await compressImage(file, 1024, 0.74);
    startCapture(photo);
  } catch(err){
    console.warn('Photo read failed:', err);
    showToast(t('toast.photoFail'), false);
  }
});

let _resizeTimer;
window.addEventListener('resize', () => { clearTimeout(_resizeTimer); _resizeTimer = setTimeout(render, 150); });

/* ---- 13. Go! ----------------------------------------------------------- */
render();
initAuth();   // check for an existing session, then show auth or the app
